name: link-check

# Guards against advertising dead URLs on the org's public surface (BL-0120:
# the profile README shipped a curl|sh installer URL that 404'd). Fails the
# build when any https link in a markdown file returns 404/410.
#
# Self-contained by design: no third-party actions beyond actions/checkout,
# so there is no supply-chain surface to audit.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # weekly, Mondays 06:17 UTC — catches link rot between pushes

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every https link in markdown files
        shell: bash
        run: |
          set -uo pipefail
          mapfile -t urls < <(
            grep -rhoE 'https://[^ )<>"`]+' --include='*.md' . \
              | sed 's/[.,;:!?]*$//' \
              | sort -u
          )
          echo "checking ${#urls[@]} unique links"
          dead=0
          for url in "${urls[@]}"; do
            code=$(curl -sIL -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo 000)
            # Some hosts reject HEAD; retry those with GET before judging.
            if [ "$code" != "200" ]; then
              code=$(curl -sL -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo 000)
            fi
            case "$code" in
              404|410)
                echo "DEAD ($code): $url"
                dead=$((dead + 1))
                ;;
              200|2*|3*)
                echo "ok   ($code): $url"
                ;;
              *)
                # 403/429/5xx/timeouts are commonly bot-blocking or transient,
                # not proof of a dead link — warn, don't fail.
                echo "warn ($code): $url"
                ;;
            esac
          done
          if [ "$dead" -gt 0 ]; then
            echo "::error::$dead dead link(s) found (HTTP 404/410)"
            exit 1
          fi
